<!DOCTYPE html>
<html>
  <head>
    <title>Classroom Availability</title>
    <style>
      body {
        font-family: Arial;
        margin: 5px;
        padding: 10px;
        background-color: white;
        text-align: center;
      }

      .container {
        border: 2px solid rgb(120, 116, 116);
        padding: 50px;
        margin: 10px;
      }

      .layout {
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .main-panel {
        flex: 1;
      }

      #searchBar {
        width: 80%;
        padding: 10px;
        border: solid rgb(78, 22, 22);
        border-radius: 5px;
        font-size: 16px;
        margin-bottom: 30px;
        color: black;
        transition: border-color 0.1s;
      }

      #searchBar:focus {
        border-color: rgb(129, 81, 75);
      }

      .class {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        justify-items: center;
        margin-left: 20px;
      }

      .class-button {
        width: 225px;
        height: 150px;
        background-color: rgb(47, 114, 132);
        color: white;
        border: none;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
      }

      .class-button:hover {
        background-color: #6592a3;
        transform: scale(1.05);
      }

      .sidebar {
        position: left;
        left: 30px;
        bottom: 10px;
        top: 55px;
        width: 175px;
        height: 600px;
        background-color: rgba(23, 63, 185, 0.815);
        z-index: 200;
        padding-top: 10px;
      }

      .button-side {
        background-color: rgb(210, 222, 247);
        border: none;
        border-radius: 20px;
        height: 70px;
        width: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 15px;
        margin-top: 40px;
        margin-left: 25px;
        margin-right: 30px;
        margin-bottom: 80px;
        font-family: Arial;
        font-size: 16px;
      }

      .button-side:hover {
        background-color: rgba(124, 144, 185);
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <h1>CLASSROOM AVAILABILITY</h1>

    <div class="layout">
      <div class="sidebar">
        <button class="button-side" onclick="showClassrooms('A')">A Building</button>
        <button class="button-side" onclick="showClassrooms('B')">B Building</button>
        <button class="button-side" onclick="showClassrooms('C')">C Building</button>
        <button class="button-side" onclick="showClassrooms('D')">D Building</button>
      </div>

      <div class="main-panel">
        <input type="text" id="searchBar" placeholder="Search" />
        <div class="class" id="classroom-buttons">
          <!-- Classroom buttons will be injected here -->
        </div>
      </div>
    </div>

    <script>
      function showClassrooms(building) {
        const classroomButtons = document.getElementById('classroom-buttons');
        classroomButtons.innerHTML = ''; // Clear current buttons

        const prefix = building + 'L';
        const classrooms = [
          prefix + '001',
          prefix + '002',
          prefix + '003',
          prefix + '101',
          prefix + '102',
          prefix + '103',
          prefix + '201',
          prefix + '202',
          prefix + '203'
        ];

        classrooms.forEach(classroom => {
          const button = document.createElement('button');
          button.classList.add('class-button');
          button.textContent = classroom;
          button.addEventListener('click', () => {
            alert(`You clicked ${classroom}`);
          });
          classroomButtons.appendChild(button);
        });
      }

      // Initially show A Building classrooms
      showClassrooms('A');
    </script>
  </body>
</html>
