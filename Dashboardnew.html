<!DOCTYPE html>
<html>
  <head>
    <title>dashboard</title>
    <style>
      body {
        font-family: Arial;
        margin: 5px;
        padding: 10px;
        background-color: white;
        text-align: center;
      }

      .container {
        border: 2px solid rgb(120, 116, 116);
        padding: 50px;
        margin: 10px;
      }

      .layout {
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }

      .main-panel {
        flex: 1;
      }

      #searchBar {
        width: 80%;
        padding: 10px;
        border: solid rgb(78, 22, 22);
        border-radius: 5px;
        font-size: 16px;
        margin-bottom: 30px;
        color: black;
        transition: border-color 0.1s;
      }

      #searchBar:focus {
        border-color: rgb(129, 81, 75);
      }

      .class {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        justify-items: center;
        margin-left: 20px;
      }

      .class-button {
        width: 225px;
        height: 150px;
        background-color: rgb(47, 114, 132);
        color: white;
        border: none;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.2s;
      }

      .class-button:hover {
        background-color: #6592a3;
        transform: scale(1.05);
      }

      .sidebar {
        left: 30px;
        bottom: 10px;
        top: 55px;
        width: 175px;
        height: 600px;
        background-color: rgba(23, 63, 185, 0.815);
        z-index: 200;
        padding-top: 10px;
      }

      .button-side {
        background-color: rgb(210, 222, 247);
        border: none;
        border-radius: 20px;
        height: 70px;
        width: 120px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 15px;
        margin-top: 40px;
        margin-left: 25px;
        margin-right: 30px;
        margin-bottom: 80px;
        font-family: Arial;
        font-size: 16px;
      }

      .button-side:hover {
        background-color: rgba(124, 144, 185);
        transform: scale(1.05);
      }
    </style>
  </head>

  <body>
    <h1>CLASSROOM AVAILABILITY</h1>

    <div class="layout">
      <div class="sidebar">
        <button class="button-side" data-id-prefix="AL">A building</button>
        <button class="button-side" data-id-prefix="BL">B building</button>
        <button class="button-side" data-id-prefix="CL">C building</button>
        <button class="button-side" data-id-prefix="DL">D building</button>
      </div>

      <div class="main-panel">
        <input type="text" id="searchBar" placeholder="Search" />
        <div class="class" id="classroom-container">
          <!-- Classroom buttons will be generated here -->
        </div>
      </div>
    </div>

    <script type="module">
      import { changestatus, readstat } from './rdbms.js';
      import { updated, dayOver} from "./scheduledlecs.js";
    
      const classroomContainer = document.getElementById('classroom-container');
    
      function generateClassrooms(buildingCode) {
        const roomNumbers = [
          '001', '002', '003',
          '101', '102', '103',
          '201', '202', '203'
        ];
    
        classroomContainer.innerHTML = ''; 
    
        roomNumbers.forEach((roomNum) => {
          const id = `${buildingCode}${roomNum}`;
          const btn = document.createElement('button');
          btn.className = 'class-button';
          btn.id = id;
          btn.textContent = id;
    
          // Initially set button color based on the status
          readstat(id).then((stat) => {
            if (stat === 'occupied') {
              btn.style.backgroundColor = "red";
            } else if (stat === 'vacant') {
              btn.style.backgroundColor = "green";
            }
          }).catch((error) => {
            console.error('Error fetching status:', error);
          });
    
          // Event listener to change status on button click
          btn.addEventListener('click', () => {
              alert(`You clicked ${btn.textContent}`);
              
              let newstat = prompt("Enter Class Room Status: 1) Vacant, 2) Occupied");
                isScheduled(btn.id)
              // Check if user has input a valid value
              if (newstat !== null && newstat !== "") { 
                // If valid input is given (not null or empty), update status
                changestatus(btn.id, newstat);
              } else {
                // Handle case if user cancels or doesn't enter anything
                alert("No status entered! The room status has not been changed.");
              }
            });

    
          classroomContainer.appendChild(btn);
    
          // Set up polling to check for status updates every 5 seconds for each button
          setInterval(() => {
            updateButtonColor(btn, id); // Update color every 5 seconds
          }, 5000);
        });
      }
    
      // Function to update button color based on room status
      function updateButtonColor(btn, id) {
        readstat(id).then((stat) => {
          if (dayOver(id)){
            btn.style.backgroundColor = "purple";
          } 
          else if (stat === 'occupied') {
            btn.style.backgroundColor = "red";
          } 

          else if (stat === 'vacant') {
            btn.style.backgroundColor = "green";
          }
        }).catch((error) => {
          console.error('Error fetching status:', error);
        });
      }
    
      const sideButtons = document.querySelectorAll('.button-side');
      sideButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          const prefix = btn.getAttribute('data-id-prefix');
          generateClassrooms(prefix);
        });
      });
    
      // Show default building 
      generateClassrooms('AL');
    </script>
    
  </body>
</html>
