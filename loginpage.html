<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Student & Teacher</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      background: url('images/classroom-bg.jpg') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.85);
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(0,0,0,0.1);
      display: flex;
      overflow: hidden;
      max-width: 900px;
      width: 100%;
      backdrop-filter: blur(10px);
    }

    .form-box {
      padding: 40px;
      flex: 1;
    }

    .form-box h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #6a11cb;
      background: linear-gradient(to right, #2575fc, #6a11cb);
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: linear-gradient(to right, #1a53ff, #500c9e);
    }

    .image-box {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .image-box img {
      width: 90%;
      max-width: 400px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-15px);
      }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        margin: 20px;
      }

      .image-box {
        order: -1;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="form-box">
    <h2>Login Portal</h2>
    <form>
      <label for="role">I am a:</label>
      <select id="role" name="role" onchange="updateImage()">
        <option value="student">Student</option>
        <option value="teacher">Teacher</option>
      </select>

      <label for="username">Username:</label>
      <input type="text" id="username" name="username" required>

      <label for="password">Password:</label>
      <input type="password" id="password" name="password" required>

      <button type="submit">Login</button>
    </form>
  </div>

  <div class="image-box">
    <img id="role-image" src="images/student.png" alt="Role Image">
  </div>
</div>

<script>
  function updateImage() {
    const role = document.getElementById('role').value;
    const image = document.getElementById('role-image');

    if (role === 'student') {
      image.src = "images/student.png";
    } else if (role === 'teacher') {
      image.src = "images/teacher.png";
    }
  }
</script>

</body>
</html>
