<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Teacher Homepage</title>
  <style>
    body {
  margin: 12px;
  font-family:arial;
  background-color:white;
}
.user-icon {
  font-size: 50px;         
  color: white;            
  margin-bottom: 10px;     
}

.header-content {
  display: flex;
  align-items: center;
  gap: 20px; 
}
 
.header {
  background-color: #4c7aae;
  color: white;
  padding:40px;
  text-align:left;
}

.main-section {
  background-color: white;
  padding: 40px;
  
 
}


.text {
  color: green;
  font-weight: bold;
  text-decoration: none;
  font-size: 25px;
  margin-top: 70px;
}

.button {
  background-color: #4c7aae;
  color: white;
  border-width: 2px;
  border-color:black;
  padding: 15px;
  font-size: 20px;
  border-radius: 20px;
  cursor: pointer;
}

.button:hover {
  background-color: #7bb1ed;
}

  </style>

</head>
<body>
  <div class="header">
    <div class="header-content">
    <i class="fas fa-user-circle user-icon"></i>

    <h1>WELCOME MS. <span id="teacher-name"></span></h1>
  </div>
  </div>

  <div class="main-section">
    <h2>Teacher details</h2>
    <p><b>Designation :</b> <span id="teacher-designation"></span></p>
    <p><b>Qualification :</b> <span id="teacher-qualification"></span></p>
    <p><b>Specialization :</b> <span id="teacher-specialization"></span></p>
    <p><b>Email:</b> <span id="teacher-email"></span></p>


    <div class="buttons">
      <div class="text">CHECK CLASSROOM AVAILABILITY  STATUS:</div><br>
      <button class="button" onclick="classInNewTab()">Classroom status</button>
    </div>
  </div>

  <script>
    function classInNewTab() {
      window.open('Dashboardnew.html','blank');
    }
  </script>
  <script type="module">
    import { db, doc, getDoc } from './firestore.js';
  
    async function loadTeacherData() {
      try {
        const teacherRef = doc(db, 'users', 't5fYH58M2grMM2jQiWbk');
        const snap = await getDoc(teacherRef);
  
        if (snap.exists()) {
          const data = snap.data();
          document.getElementById('teacher-name').textContent = data.Name || '';
          document.getElementById('teacher-designation').textContent = data.Designation || '';
          document.getElementById('teacher-qualification').textContent = data.Qualification || '';
          document.getElementById('teacher-specialization').textContent = data.Specialization || '';
          document.getElementById('teacher-email').textContent = data.Email || '';
        } else {
          console.log("Document does not exist.");
        }
      } catch (error) {
        console.error("Error fetching teacher data:", error);
      }
    }
  

    loadTeacherData();
  </script>
  
</body>
</html>
