<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Teacher Homepage</title>
  <style>
   * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: rgb(151, 182, 182);
      color:black;
      padding: 10px;
    }
    .header {
  background: rgb(31, 102, 132);
  color:white;
  text-align:center;
  padding: 50px;
  border-radius: 15px;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 70px;
}

.header-content i {
  font-size: 50px;
}

.header-content h1 {
  font-size: 40px;
  text-align:center;
  margin: 0; 
}
      .container {
      width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: rgb(167, 190, 194);
      border-radius: 20px;
      box-shadow: 10px 8px 32px rgb(71, 70, 70,0.4);
    }

    h2 {
      font-size: 28px;
      color: rgb(21, 85, 112);
      margin-bottom: 30px;
      
    }

    .info p{
      font-size: 20px;
      margin-top:10px;
      margin-bottom:20px;
      color: black;
    }


    .text {
      margin-top: 20px;
      font-size: 20px;
      font-weight:bold ;
      color: #20523b;
    }

    .button {
      margin-top: 20px;
      background:rgb(173, 30, 30);
      color: white;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .button:hover {
      opacity: 0.85;
      transform:scale(1.05);
    }

  </style>

</head>
<body>
  <div class="header">
    <div class="header-content">
    <i class="fas fa-user-circle"></i>

    <h1>Welcome, Ms. <span id="teacher-name"></span></h1>
  </div>
  </div>

   <div class="container">
    <h2>Teacher details</h2>
     <div class="info">
    <p><b>Designation :</b> <span id="teacher-designation"></span></p>
    <p><b>Qualification :</b> <span id="teacher-qualification"></span></p>
    <p><b>Specialization :</b> <span id="teacher-specialization"></span></p>
    <p><b>Email:</b> <span id="teacher-email"></span></p><br><br>
      </div>


      <div class="text">Check Classroom Availability Status:</div>
      <button class="button" onclick="classInNewTab()">Classroom status</button>
    </div>
  

  <script>
    function classInNewTab() {
      window.open('Dashboardnew.html','blank');
    }
  </script>
  <script type="module">
    import { db, doc, getDoc } from './firestore.js';
  
    async function loadTeacherData() {
      try {
        const teacherRef = doc(db, 'users', 't5fYH58M2grMM2jQiWbk');
        const snap = await getDoc(teacherRef);
  
        if (snap.exists()) {
          const data = snap.data();
          document.getElementById('teacher-name').textContent = data.Name || '';
          document.getElementById('teacher-designation').textContent = data.Designation || '';
          document.getElementById('teacher-qualification').textContent = data.Qualification || '';
          document.getElementById('teacher-specialization').textContent = data.Specialization || '';
          document.getElementById('teacher-email').textContent = data.Email || '';
        } else {
          console.log("Document does not exist.");
        }
      } catch (error) {
        console.error("Error fetching teacher data:", error);
      }
    }
  

    loadTeacherData();
  </script>
  
</body>
</html>
