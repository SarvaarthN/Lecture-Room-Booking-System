<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <title>Teacher Homepage</title>
  <style>
    body {
  margin: 2px;
  font-family:arial;
  background-color:white;
}
.user-icon {
  font-size: 50px;         
  color: white;            
  margin-bottom: 10px;     
}

.header-content {
  display: flex;
  align-items: center;
  gap: 20px; 
}
 
.header {
  background-color: #4c7aae;
  color: white;
  padding:40px;
  text-align:left;
}

.main-section {
  background-color: white;
  padding: 40px;
 
}


.text {
  color: green;
  font-weight: bold;
  text-decoration: none;
  font-size: 25px;
}

.button {
  background-color: rgb(177, 30, 30);
  color: white;
  border-width: 2px;
  border-color:black;
  padding: 15px;
  font-size: 20px;
  border-radius: 20px;
  cursor: pointer;
}

.button:hover {
  background-color: #df283a;
}

  </style>

</head>
<body>
  <div class="header">
    <div class="header-content">
    <i class="fas fa-user-circle user-icon"></i>

    <h1>WELCOME MS. </h1>
  </div>
  </div>

  <div class="main-section">
    <h2>Teacher details:</h2>
    <p><b>Name :</b></p>
    <p><b>Designation :</b></p>
    <p><b>Qualification :</b></p>
    <p><b>Specialization :</b></p>
    <p><b>Email:</b></p><br><br>

    <div class="buttons">
      <div class="text">CHECK CLASSROOM AVAILABILITY  STATUS:</div><br>
      <button class="button">Classroom status</button>
    </div>
  </div>
</body>
</html>
