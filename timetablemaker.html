<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ClassRoom Timetable</title>
  <style>
    body {
      background-image: url(https://theroaminggastrognome.com/wp-content/uploads/2012/12/snow-very-light-background.jpg);
      background-size: cover;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      font-size: 20px;
      display: grid;
      justify-content: center;
      text-align: center;
    }

    table {
      margin: 0 auto; 
      border-collapse: collapse;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
    }

    td, th {
      width: 200px; 
      height: 40px;    
      border: 2px solid black;
      padding: 10px;
      text-align: center;
    }

    tr:nth-child(1) {
      background-color: rgb(171, 0, 88);
      color: white;
    }

    td:nth-child(1) {
      background-color: rgb(171, 0, 88);
      color: white;
      font-weight: bold; 
    }

  </style>
</head>
<body>
  <h1 id="classroom-title">Timetable of Class</h1> 

  <script type="module">
      import { addtimetable, readTimetable } from './rdbms.js';

      const timetableContainer = document.createElement('div');
      document.body.appendChild(timetableContainer);

      // Get room ID from URL parameters
      const urlParams = new URLSearchParams(window.location.search);
      const roomName = urlParams.get('room') || 'AL101';  // Default to AL101 if no room is there

      // Set heading based on the room ID
      const classroomTitle = document.getElementById('classroom-title');
      classroomTitle.innerText = `Timetable of Class ${roomName}`;

      async function showTimetable(room) {
        timetableContainer.innerHTML = "Loading timetable...";

        const timetableData = await readTimetable(room);

        if (!timetableData) {
          timetableContainer.innerHTML = "<p>No timetable found!</p>";
          return;
        }

        timetableContainer.innerHTML = "";

        const table = document.createElement('table');
        table.border = "1";
        table.style.borderCollapse = "collapse";
        table.style.width = "80%";

        const headerRow = document.createElement('tr');
        headerRow.innerHTML = "<th>Day</th>";

        const times = ["9:30-10:25", "10:30-11:25", "11:30-12:25"];
        for (let time of times) {
          const th = document.createElement('th');
          th.innerText = time;
          headerRow.appendChild(th);
        }
        table.appendChild(headerRow);

        // Day order for timetable
        const dayOrder = ["monday", "tuesday", "wednesday", "thursday", "friday"];

        for (let day of dayOrder) {
          if (!timetableData[day]) continue;

          const row = document.createElement('tr');
          const dayCell = document.createElement('td');
          dayCell.innerText = day.charAt(0).toUpperCase() + day.slice(1);
          row.appendChild(dayCell);

          for (let time of times) {
            const cell = document.createElement('td');
            const content = timetableData[day][time] || "VACANT";
            cell.innerText = content;

            // Apply different colors based on the content
            if (content.toUpperCase().includes("VACANT")) {
              cell.style.backgroundColor = "#0ce00f";
              cell.style.fontStyle = "italic";
              cell.style.textDecoration = "underline";
            } else if (content.toUpperCase().includes("EXTC")) {
              cell.style.backgroundColor = "#fca3d7";
            } else if (content.toUpperCase().includes("MECH")) {
              cell.style.backgroundColor = "#7fefe6";
            } else if (content.toUpperCase().includes("COMP")) {
              cell.style.backgroundColor = "#CBAACB";
            } else if (content.toUpperCase().includes("EE")) {
              cell.style.backgroundColor = "#FFFACD";
            } else if (content.toUpperCase().includes("EC")) {
              cell.style.backgroundColor = "#FFD8B1";
            } else if (content.toUpperCase().includes("IT")) {
              cell.style.backgroundColor = "#ef95f9";
            } else if (content.toUpperCase().includes("PROD")) {
              cell.style.backgroundColor = "#B2DFDB";
            } else if (content.toUpperCase().includes("TEXTILE")) {
              cell.style.backgroundColor = "#FFE5B4";
            } else if (content.toUpperCase().includes("CIVIL")) {
              cell.style.backgroundColor = "#AAF0D1";
            }

            row.appendChild(cell);
          }
          table.appendChild(row);
        }
        timetableContainer.appendChild(table);
      }

      showTimetable(roomName);
  </script>
</body>
</html>
