<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>
  body {
  font-family: Arial;
  margin: 40px;
  padding: 20px;
  background-color: white;
  text-align: center;
}

.container {
  border: 2px solid rgb(120, 116, 116);
  padding: 50px;
  margin: 10px;
}

.layout {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}


.main-panel {
  flex: 0.75;
}

#searchBar {
  width: 80%;
  padding: 10px;
  border :solid rgb(78, 22, 22);
  border-radius:5px;
  font-size: 16px;
  margin-bottom: 30px;
  color: black;
  transition: border-color 0.1s;
}

#searchBar:focus {
  border-color: rgb(129, 81, 75);
  
}

.class {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 20px;
  justify-items: center;
}

.class-button {
  width: 200px;
  height: 100px;
  background-color: rgb(47, 114, 132);
  color: white;
  border: none;
  font-size: 18px;
  cursor: pointer;
  transition: background-color 0.3s, transform 0.2s;
}

.class-button:hover {
  background-color: #6592a3;
  transform: scale(1.05);
}

</style>
<body>
  <h1>CLASSROOM AVAILABILITY</h1>
  <div class="container">
    <div class="layout">
      

      <div class="main-panel">
        <input type="text" id="searchBar" placeholder="Search" />
        <div class="class">
          <button class="class-button">Classroom 1</button>
          <button class="class-button">Classroom 2</button>
          <button class="class-button">Classroom 3</button>
          <button class="class-button">Classroom 4</button>
          <button class="class-button">Classroom 5</button>
          <button class="class-button">Classroom 6</button>
          <button class="class-button">Classroom 7</button>
          <button class="class-button">Classroom 8</button>
          <button class="class-button">Classroom 9</button>
        </div>
      </div>
    </div>
  </div>
<script>
const classButtons = document.querySelectorAll(".class-button");
  classButtons.forEach(button => {
    button.addEventListener("click", () => {
      alert(`You clicked ${button.textContent}`);
    });
  });
  </script>

</body>
</html>
