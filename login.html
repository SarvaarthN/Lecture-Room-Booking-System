<!DOCTYPE html>

<head>
 
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
     background-image:url("https://upload.wikimedia.org/wikipedia/commons/b/b4/VJTI_Quadrangle.jpg");
      background-position: center;
      background-size: cover;
     
    }
    .login-box {
      background: rgba(194, 211, 213, 0.5);
      border: 2px solid rgb(20, 18, 18,0.2);
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
     font-weight: bold;
    }
    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }
    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #110f0f;
    }
    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 1px solid #020101;
      border-radius: 8px;
      font-size: 16px;
    }
    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #2575fc;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }
    button:hover {
      background: #1a53ff;
    }
    #error-message {
      margin-top: 10px;
      color: red;
      font-size: 18px;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form id="loginRole">
    <label for="role">I am a:</label>
    <select id="role" name="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>

    <label for="userId">Username:</label>
    <input type="text" id="userId" name="userId" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button id="submitbutton" type="submit">Login</button>
    <div id="error-message"></div> <!-- Message will appear here -->
  </form>
</div>

<script type="module">
import { db, collection, query, where, getDocs } from './firestore.js';

const loginForm = document.getElementById("loginRole");
const errorMessage = document.getElementById("error-message");

loginForm.addEventListener("submit", async function (e) {
  e.preventDefault();
  errorMessage.textContent = ""; 

  const userId = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;

  if (!role || !userId || !password) {
    errorMessage.textContent = "Please fill all fields.";
    return;
  }

  try {
    const usersRef = collection(db, "users");
    const q = query(usersRef, where("userId", "==", userId)); // Make sure your field is userId
    const querySnapshot = await getDocs(q);

    if (querySnapshot.empty) {
      errorMessage.textContent = "User does not exist.";
      return;
    }

    let loggedIn = false;
    querySnapshot.forEach(doc => {
      const data = doc.data();

      if (data.password === password && data.role === role) {
        loggedIn = true;
        
        localStorage.setItem("userDocId", doc.id);
        localStorage.setItem("userRole", role);

        if (role === "teacher") {
          window.location.href = "Teacherhomepage.html";
        } else {
          window.location.href = "Studentpage.html";
        }
      }
    });

    if (!loggedIn) {
      errorMessage.textContent = "Incorrect password or role.";
    }

  } catch (error) {
    errorMessage.textContent = "Something went wrong. Try again.";
  }
});
</script>

</body>
</html>
