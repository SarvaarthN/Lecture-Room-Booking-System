<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="firestore.js" defer> </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #2575fc;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #1a53ff;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form id="loginRole">
    <label for="role">I am a:</label>
    <select id="role" name="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>

    <label for="userId">Username:</label>
    <input type="text" id="userId" name="userId" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button id="submitbutton" type="submit">Login</button>
  </form>
</div>

<script type="module">
  import { db, doc, getDoc } from './firestore.js';

document.getElementById("loginRole").addEventListener("submit", async function(e) {
  e.preventDefault();

  const userId = document.getElementById('userId').value;
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;

  if (!role || !userId || !password) {
    alert("Please fill all fields.");
    return;
  }

  try {
    console.log("Attempting to fetch user data...");

    // Reference to the user document in Firestore
    const userRef = doc(db, "users", userId);
    const userSnap = await getDoc(userRef);  // Fetch the user document

    if (userSnap.exists()) {
      const userData = userSnap.data();
      console.log("User found:", userData);

      // Check if the password is correct
      if (userData.password === password) {
        // Check if the role matches
        if (userData.role === role) {
          console.log("Login successful!");

          if (role === "teacher") {
            window.location.href = "Teacherhomepage.html";  // Redirect to Teacher's page
          } else if (role === "student") {
            alert("Student login successful.");
            // Add your redirection for students if needed
          } else {
            alert("Invalid role selected.");
          }
        } else {
          console.log("Incorrect role.");
          alert("Incorrect password or role.");
        }
      } else {
        // If the password is wrong
        console.log("Incorrect password.");
        alert("Wrong Password.");
      }
    } else {
      console.log("User does not exist.");
      alert("User does not exist.");
    }
  } catch (error) {
    console.error("Error logging in:", error);
    alert("Error connecting to database.");
  }
});



</script>


</body>
</html>
