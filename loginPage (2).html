<!DOCTYPE html>
<html lang="en">
<head>
  <script type="module" src="firestore.js" defer> </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #2575fc;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #1a53ff;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form id="loginRole">
    <label for="role">I am a:</label>
    <select id="role" name="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>

    <label for="userId">Username:</label>
    <input type="text" id="userId" name="userId" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button id="submitbutton" type="submit">Login</button>
  </form>
</div>

<script>
    document.getElementById("loginRole").addEventListener("submit", function(e) {
      e.preventDefault();
      const userId = document.getElementById('userId').value;
      const password = document.getElementById('password').value;
      let roleOfUser=document.getElementById('role').value;
      alert(roleOfUser);
      if(roleOfUser!="" && userId!="" && password!="")
        loginForm()
      //else alert("Please Enter A Value")
    });
  function loginForm() {
            const userId = document.getElementById('userId').value;
            const password = document.getElementById('password').value;
            const roleofuser=document.getElementById('role').value;
            console.log(roleofuser)
            window.location.href = "Teacherhomepage.html" 
     }
</script>

</body>
</html>
