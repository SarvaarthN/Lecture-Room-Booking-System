<!DOCTYPE html>
<html lang="en">
<head>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f5f5f5;
    }

    .login-box {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      color: #333;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
      color: #444;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border: 2px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    button {
      margin-top: 25px;
      width: 100%;
      padding: 12px;
      background: #2575fc;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #1a53ff;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login</h2>
  <form id="loginRole">
    <label for="role">I am a:</label>
    <select id="role" name="role" required>
      <option value="" disabled selected>Select role</option>
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
    </select>

    <label for="userId">Username:</label>
    <input type="text" id="userId" name="userId" required>

    <label for="password">Password:</label>
    <input type="password" id="password" name="password" required>

    <button id="submitbutton" type="submit">Login</button>
  </form>
</div>

<script type="module">
import { db, collection, query, where, getDocs } from './firestore.js';

document.getElementById("loginRole").addEventListener("submit", async function (e) {
  e.preventDefault();

  const userId = document.getElementById('userId').value.trim();
  const password = document.getElementById('password').value;
  const role = document.getElementById('role').value;

  if (!role || !userId || !password) {
    alert("Please fill all fields.");
    return;
  }

  try {
    console.log("Querying for userId:", userId);

    const usersRef = collection(db, "users");
    const q = query(usersRef, where("userId", "==", userId));
    const querySnapshot = await getDocs(q);

    if (querySnapshot.empty) {
      console.log("No user found with userId:", userId);
      alert("User does not exist.");
      return;
    }

    let loggedIn = false;
    querySnapshot.forEach(doc => {
      const data = doc.data();
      console.log("Fetched user data:", data);

      if (data.password === password && data.role === role) {
        loggedIn = true;
        if (role === "teacher") {
          window.location.href = "Teacherhomepage.html";
        } else {
          window.location.href = "Studenthomepage.html";
        }
      }
    });

    if (!loggedIn) {
      alert("Incorrect password or role.");
    }

  } catch (err) {
    console.error("Login error:", err);
    alert("Something went wrong. Check console for details.");
  }
});
</script>



</body>
</html>
