<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Student Homepage</title>
  <style>
   * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: 			#E5ECF6;
      color:black;
      padding: 10px;
    }
    .header {
  background: 	#1E3A8A;
  color:#FFFFFF;
  text-align:center;
  padding: 50px;
  border-radius: 15px;
}

.header-content {
  display: flex;
  align-items: center;
  gap: 70px;
}

.header-content i {
  font-size: 50px;
}

.header-content h1 {
  font-size: 40px;
  text-align:center;
  margin: 0; 
}
      .container {
      width: 900px;
      margin: 40px auto;
      padding: 40px;
      background: 		#D1FAE5;
      border-radius: 20px;
      box-shadow: 12px 10px 36px rgba(0, 0, 0, 0.2);
    }

    h2 {
      font-size: 28px;
      color:#1E3A8A;
      margin-bottom: 30px;
      
    }

    .info p{
      font-size: 20px;
      margin-top:10px;
      margin-bottom:20px;
      color:#1F2937;
    }


    .text {
      margin-top: 20px;
      font-size: 20px;
      font-weight:bold ;
      color:	#10B981;
    }

    .button {
      margin-top: 20px;
      background:#10B981;
      color: white;
      padding: 15px;
      font-size: 16px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
    }

    .button:hover {
      opacity: 0.85;
      transform:scale(1.05);
    }

  </style>

</head>
<body>
  <div class="header">
    <div class="header-content">
    <i class="fas fa-user-circle"></i>

    <h1>Welcome, <span id="student-name"></span></h1>
  </div>
  </div>

   <div class="container">
    <h2>Student details</h2>
     <div class="info">
    <p><b>Class :</b> <span id="student-class"></span></p>
    <p><b>Registration Id :</b> <span id="student-regId"></span> </p>
    <p><b>Date of Birth :</b> <span id="student-dob"></span> </p>
    <p><b>Gender :</b> <span id="student-gender"></span></p><br><br>
      </div>


      <div class="text">Check Classroom Availability Status:</div>
      <button class="button" onclick="classInNewTab()">Classroom status</button>
    </div>
  
    <script>
      function classInNewTab() {
        window.open('Dashboardnew.html','blank');
      }
    </script>
    <script type="module">
      import { db, doc, getDoc } from './firestore.js';
    
      async function loadStudentData() {
        
        const docId = localStorage.getItem("userDocId");
        const role = localStorage.getItem("userRole");
      
        if (!docId || role !== "student") {
        alert("Unauthorized access or missing user info.");
        window.location.href = "login.html";
      }

        try {
          const StudentRef = doc(db, 'users', docId);
          const snap = await getDoc(StudentRef);
    
          if (snap.exists()) {
            const data = snap.data();
            document.getElementById('student-name').textContent = data.Name || '';
            document.getElementById('student-class').textContent = data.Class || '';
            document.getElementById('student-regId').textContent = data.Registration_Id || '';
            document.getElementById('student-dob').textContent = data.D_O_B || '';
            document.getElementById('student-gender').textContent = data.Gender || '';
          } else {
            console.log("Document does not exist.");
          }
        } catch (error) {
          console.error("Error fetching student data:", error);
        }
      }
    
  
      loadStudentData();
    </script>
  
</body>
</html>
