<!DOCTYPE html>
<html>
  <head>
    <title>dashboard</title>
    <style>
      body {
        font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
        text-align: center;
        background-image: url(https://vjti.ac.in/wp-content/uploads/2024/06/vjti-maingate.png);
        background-color: rgba(255,255,255,0.5);
        background-blend-mode: lighten;
        background-size: cover;
      }

      .college {
        font-size: 30px;
        padding-bottom: 10px;
        padding-top: 10px;
      }

      .text {
        font-size: 50px;
        font-weight: bold;
        text-decoration: underline;
      }

      .container {
        border: 2px solid rgb(120, 116, 116);
        padding: 50px;
        margin: 10px;
      }

      .layout {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 15px;
      }

      .main-panel {
        flex: 1;
      }

      .class {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 40px;
        justify-content: center;
        margin-left: 20px;
      }

      .class-button {
        width: 225px;
        height: 150px;
        border-radius: 60px;
        background-color: rgb(47, 114, 132);
        color: white;
        border: none;
        font-family:Verdana, Geneva, Tahoma, sans-serif;
        font-size: 18px;
        cursor: pointer;
        transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
      }

      .class-button:hover {
        background-color: #6592a3;
        transform: scale(1.05);
        box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
      }

      .sidebar {
        margin-top: 40px;
        left: 10px;
        bottom: 10px;
        top: 50px;
        width: 130px;
        height: 700px;
        background-color: rgb(16, 4, 58);
        z-index: 200;
        padding-top: 10px;
      }

      .side-text {
       margin-top: 5px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        color:rgb(118, 199, 250);
        font-size: 25px;
        justify-content: center;
        align-items: center;
        font-style: bold;
        text-decoration: underline;
      }

      .button-side {
        background-color: rgb(210, 222, 247);
        border: none;
        border-radius: 40px;
        height: 80px;
        width: 80px;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        padding: 15px;
        margin-top: 40px;
        margin-left: 25px;
        margin-right: 30px;
        margin-bottom: 80px;
        font-size: 25px;
        font-weight: bold;
        transition: background-color 0.3s, transform 0.3s;
      }

      .button-side:hover {
        background-color: rgba(124, 144, 185);
        transform: scale(1.05);
        transition-duration:0s;
      }

      .hover-popup {
        position: absolute;
        background-color: rgba(255, 255, 255, 0.9);
        border: 1px solid gray;
        padding: 8px;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        z-index: 999;
        transition: opacity 0.3s ease;
      }

      .hover-popup button {
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
        background-color: #4682B4;
        color: white;
        transition: background-color 0.2s;
      }

      .hover-popup button:hover {
        background-color: #315f7d;
      }

      .status-change-popup {
        position: absolute;
        background-color: rgba(255, 255, 255, 0.9);
        border: 1px solid gray;
        padding: 15px;
        border-radius: 8px;
        display: none;
        flex-direction: column;
        gap: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        z-index: 999;
        transition: opacity 0.3s ease;
      }

      .status-change-popup button {
        font-size: 14px;
        padding: 10px;
        background-color: rgb(47, 114, 132);
        border-radius: 5px;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
      }

      .status-change-popup button:hover {
        background-color: #6592a3;
      }

      .header{
        height: 130px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;

        position: absolute;
        top: 0;
        left: 0;
        z-index: 100;
      }

      .left-section {
        margin-top: 15px;
        display: flex;
        align-items: center;
      }

      .vjti-logo {
        height: 125px;
        width: auto;
        margin-left: 26px;
        margin-right: 5px;
        margin-bottom: 15px;
        margin-top: 20px;
        
      }
    </style>
  </head>

  <body>
    <div class="college">Veermata Jijabai Technological Institute</div>
    <div class="text">CLASSROOM AVAILABILITY</div>
    <script type="module"> 
    import { startDay} from "./isolate.js";      
      window.startDay = startDay;
    </script>
    <div class="layout">
      <div class="sidebar">
        <p class="side-text">Buildings</p>
        <button class="button-side" data-id-prefix="AL">A </button>
        <button class="button-side" data-id-prefix="BL">B </button>
        <button class="button-side" data-id-prefix="CL">C </button>
        <button class="button-side" data-id-prefix="DL">D </button>
        <button id="Database" onclick="startDay()" style="display: none;">Start Database</button>
      </div>

      <div class="main-panel">
          <div class="class" id="classroom-container">
          <!-- Classroom buttons will be generated here -->
        </div>
      </div>
    </div>

    <header class="header">
      <div class="left-section">
        <img class="vjti-logo"  src="https://seeklogo.com/images/V/vjti-college-logo-707F46CDA8-seeklogo.com.png">
      </div>
    </header>

    <script type="module">
      import { changestatus, readstat, getCurrentClass,setCurrentClass } from './rdbms.js';
      import { updated, dayOver} from "./scheduledlecs.js";
      import { startDay} from "./isolate.js";
      
      const role=localStorage.getItem("userRole");

      if (role === "teacher") {
      const changeBtn = document.getElementById('changeStatusBtn');
      const database = document.getElementById('Database');
      if (changeBtn) {
        changeBtn.style.display = 'block';
      }
      if (database) {
        database.style.display = 'block';
      }
     }

      document.getElementById('showTimetableBtn').addEventListener('click', () => {
        if (currentHoveredButton) {
          const roomId = currentHoveredButton.id;
          window.open(`timetablemaker.html?room=${roomId}`, '_blank');

        }
      });

      const classroomContainer = document.getElementById('classroom-container');
    
      const hoverPopup = document.getElementById('hover-popup');
      const statusChangePopup = document.getElementById('status-change-popup');
      let currentHoveredButton = null;

      function generateClassrooms(buildingCode) {
        const roomNumbers = [
          '001', '002', '003',
          '101', '102', '103',
          '201', '202', '203'
        ];
    
        classroomContainer.innerHTML = ''; 
        roomNumbers.forEach((roomNum) => {
          const id = `${buildingCode}${roomNum}`;
          const btn = document.createElement('button');
          btn.className = 'class-button';
          btn.id = id;
          btn.textContent = id;
    
         // Set initial color
         readstat(id).then((stat) => {
            if (stat === 'occupied') {
              btn.style.backgroundColor = "red";
            } else if (stat === 'vacant') {
              btn.style.backgroundColor = "green";
            } else if (stat === 'scheduled') {
              btn.style.backgroundColor = "purple";
            }
          }).catch((error) => {
            console.error('Error fetching status:', error);
          });

          btn.addEventListener('mouseenter', (e) => {
            currentHoveredButton = btn;
            hoverPopup.style.display = 'flex';
            hoverPopup.style.left = (e.pageX + 15) + 'px';
            hoverPopup.style.top = (e.pageY + 15) + 'px';
            hoverPopup.style.opacity = 1; // Make it visible immediately
          });

          btn.addEventListener('mouseleave', () => {
            if (!hoverPopup.matches(':hover') && !statusChangePopup.matches(':hover')) {
              hoverPopup.style.opacity = 0; // Fade out the popup
              setTimeout(() => {
                hoverPopup.style.display = 'none';
              }, 300); // Ensure the popup is hidden after fade out
              currentHoveredButton = null;
            }
          });

          classroomContainer.appendChild(btn);

          setInterval(() => {
            updateButtonColor(btn, id);
          }, 1000);
        });
      }

      async function updateButtonColor(btn, id) {
        try {
          const stat = await readstat(id);
          if (stat === 'occupied') {
            btn.style.backgroundColor = "red";
          } else if (stat === 'vacant') {
            btn.style.backgroundColor = "green";
          } else if (stat === 'scheduled') {
            btn.style.backgroundColor = "purple";
            
            
          }
          let status=await getCurrentClass(id)
          btn.innerHTML  = id + "<br><br>" + status
        } catch (error) {
          console.error('Error fetching status:', error);
        }
      }

      const sideButtons = document.querySelectorAll('.button-side');
      sideButtons.forEach((btn) => {
        btn.addEventListener('click', () => {
          const prefix = btn.getAttribute('data-id-prefix');
          generateClassrooms(prefix);
        });
      });

      // Hover popup button click
      document.getElementById('changeStatusBtn').addEventListener('click', () => {
        if (currentHoveredButton) {
          statusChangePopup.style.display = 'flex';
          statusChangePopup.style.left = (event.pageX + 15) + 'px';
          statusChangePopup.style.top = (event.pageY + 15) + 'px';
          statusChangePopup.style.opacity = 1; // Make it visible immediately
        }
      });

      // Status change buttons
      document.getElementById('changeToVacant').addEventListener('click', async() => {
        if (currentHoveredButton) {
          changestatus(currentHoveredButton.id, 1); // Change status to 1 (vacant)
          await setCurrentClass(currentHoveredButton.id,"VACANT")
          
          // Change the color immediately after status update
          //currentHoveredButton.style.backgroundColor = 'green';
          
          // Hide the popup with a smooth fade
          statusChangePopup.style.opacity = 0;
          setTimeout(() => {
            statusChangePopup.style.display = 'none';  // Hide the popup after fading
          }, 300);
        }
      });

      document.getElementById('changeToOccupied').addEventListener('click', async () => {
        if (currentHoveredButton) {
          console.log(await readstat(currentHoveredButton.id));

          if(await readstat(currentHoveredButton.id)=="vacant"){
             await setCurrentClass(currentHoveredButton.id,"OCCUPIED")
            console.log("Hello World")
          }
          changestatus(currentHoveredButton.id, 2);
          //else if(readstat(currentHoveredButton.id)==3){setCurrentClass(currentHoveredButton.id,)}
          
          // Change the color immediately after status update
          //currentHoveredButton.style.backgroundColor = 'red'; This function was not needed as we are changing the colour of button in updateButtonColor() Function. If you happen to read this then remove this line, I have kept it only for your understanding ;)
          
          // Hide the popup with a smooth fade
          statusChangePopup.style.opacity = 0;
          setTimeout(() => {
            statusChangePopup.style.display = 'none';  // Hide the popup after fading
          }, 300);
        }
      });

      generateClassrooms('AL'); // Default

    </script>

    <!-- Hover Popup -->
    <div id="hover-popup" class="hover-popup">
      <button id="changeStatusBtn" style="display: none;">Change Classroom Availability</button>
      <button id="showTimetableBtn">Show Timetable</button>
    </div>

    <!-- Status Change Popup -->
    <div id="status-change-popup" class="status-change-popup">
      <button id="changeToVacant">1- Change to Vacant</button>
      <button id="changeToOccupied">2- Change to Occupied</button>
    </div>

    <!-- Classroom Container -->
    <div id="classroom-container" class="class"></div>
  </body>
</html>
