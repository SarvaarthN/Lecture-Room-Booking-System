<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Homepage</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Your CSS -->
  <link rel="stylesheet" href="../CSS/Studentpage.css">
</head>
<body>

  <div class="header">
    <div class="header-content">
      <i class="fas fa-user-circle"></i>
      <h1>Welcome, <span id="student-name"></span></h1>
    </div>
  </div>

  <div class="container">
    <h2>Student details</h2>
    <div class="info">
      <p><b>Class :</b> <span id="student-class"></span></p>
      <p><b>Registration Id :</b> <span id="student-regId"></span></p>
      <p><b>Date of Birth :</b> <span id="student-dob"></span></p>
      <p><b>Gender :</b> <span id="student-gender"></span></p>
    </div>

    <div class="text">Check Classroom Availability Status:</div>
    <button class="button" id="classBtn">Classroom status</button>
  </div>

  <!-- Your JS -->
  <script type="module" src="../JavaScript/Studentpage.js"></script>
</body>
</html>
